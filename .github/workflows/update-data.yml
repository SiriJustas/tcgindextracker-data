name: Update and publish index data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8,12,16,20 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate scripts
        run: |
          node --check scripts/cardmarket-sources.js
          node --check scripts/check-price-guide-fresh.js
          node --check scripts/check-update-needed.js
          node --check scripts/download-cardmarket-data.js
          node --check scripts/generate-data.js
          node --check scripts/index-engine.js
          node --check scripts/update-checks.js
          node --check scripts/validate-generated-data.js

      - name: Check if today's data is already published
        id: update-needed
        run: node scripts/check-update-needed.js

      - name: Download Cardmarket files
        if: steps.update-needed.outputs.needed == 'true'
        run: node scripts/download-cardmarket-data.js

      - name: Check downloaded price guide freshness
        id: price-guide
        if: steps.update-needed.outputs.needed == 'true'
        run: node scripts/check-price-guide-fresh.js

      - name: Generate compact JSON
        if: steps.update-needed.outputs.needed == 'true' && steps.price-guide.outputs.fresh == 'true'
        run: npm run generate:data

      - name: Validate generated data
        if: steps.update-needed.outputs.needed == 'true' && steps.price-guide.outputs.fresh == 'true'
        run: node scripts/validate-generated-data.js

      - name: Commit generated data
        id: commit
        if: steps.update-needed.outputs.needed == 'true' && steps.price-guide.outputs.fresh == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f public/data .index-state/state.json
          if [ -d audit ]; then
            git add -f audit
          fi
          if git diff --cached --quiet; then
            echo "No generated data changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "UPD: TCG index data."
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
