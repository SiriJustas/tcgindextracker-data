name: Update and publish index data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8,12,16,20 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate scripts
        run: |
          node --check scripts/cardmarket-sources.js
          node --check scripts/check-price-guide-fresh.js
          node --check scripts/check-update-needed.js
          node --check scripts/download-cardmarket-data.js
          node --check scripts/generate-data.js
          node --check scripts/index-engine.js
          node --check scripts/update-checks.js

      - name: Check if today's data is already published
        id: update-needed
        run: node scripts/check-update-needed.js

      - name: Download Cardmarket files
        if: steps.update-needed.outputs.needed == 'true'
        run: node scripts/download-cardmarket-data.js

      - name: Check downloaded price guide freshness
        id: price-guide
        if: steps.update-needed.outputs.needed == 'true'
        run: node scripts/check-price-guide-fresh.js

      - name: Generate compact JSON
        if: steps.update-needed.outputs.needed == 'true' && steps.price-guide.outputs.fresh == 'true'
        run: npm run generate:data

      - name: Validate generated data
        if: steps.update-needed.outputs.needed == 'true' && steps.price-guide.outputs.fresh == 'true'
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const windowsAbsolutePath = /[A-Za-z]:[\\/]/;
          const unixHomePath = /\/home\/[^/\s"]+\//;
          const macHomePath = /\/u(?:sers)\/[^/\s"]+\//i;

          function readJson(file) {
            if (!fs.existsSync(file)) {
              throw new Error(`Missing required generated file: ${file}`);
            }
            const text = fs.readFileSync(file, "utf8");
            if (windowsAbsolutePath.test(text) || unixHomePath.test(text) || macHomePath.test(text)) {
              throw new Error(`Local filesystem path found in ${file}`);
            }
            const data = JSON.parse(text);
            assertNoDemoKeys(data, file);
            return data;
          }

          function assertNoDemoKeys(value, file) {
            if (!value || typeof value !== "object") return;
            for (const [key, child] of Object.entries(value)) {
              if (/^demo/i.test(key)) {
                throw new Error(`Demo metadata key found in ${file}`);
              }
              assertNoDemoKeys(child, file);
            }
          }

          const manifest = readJson("public/data/pokemon/manifest.json");
          const summary = readJson("public/data/pokemon/summary.json");
          const indexDir = "public/data/pokemon/indexes";
          const indicatorDir = "public/data/pokemon/indicators";
          const universeDir = "public/data/pokemon/universes";
          const expectedUniverseCount = fs.readdirSync(universeDir).filter((name) => name.endsWith(".json")).length;
          const expectedIndexCount = expectedUniverseCount * 2;
          const expectedIndicatorCount = expectedUniverseCount;

          if (!Array.isArray(manifest.indexes) || manifest.indexes.length !== expectedIndexCount) {
            throw new Error(`manifest.json must list exactly ${expectedIndexCount} indexes`);
          }
          if (!Array.isArray(manifest.indicators) || manifest.indicators.length !== expectedIndicatorCount) {
            throw new Error(`manifest.json must list exactly ${expectedIndicatorCount} indicator files`);
          }
          if (!Array.isArray(manifest.universes) || manifest.universes.length !== expectedUniverseCount) {
            throw new Error(`manifest.json must list exactly ${expectedUniverseCount} universes`);
          }
          if (!Array.isArray(summary.indexes) || summary.indexes.length !== expectedIndexCount) {
            throw new Error(`summary.json must list exactly ${expectedIndexCount} indexes`);
          }
          if (!Array.isArray(summary.indicators) || summary.indicators.length !== expectedIndicatorCount) {
            throw new Error(`summary.json must list exactly ${expectedIndicatorCount} indicator summaries`);
          }

          const requiredIds = [
            "global-singles",
            "global-booster-boxes",
            "global-booster-packs",
          ];
          for (const id of requiredIds) {
            if (!manifest.universes.some((universe) => universe.id === id)) {
              throw new Error(`Missing required universe: ${id}`);
            }
            if (!manifest.indicators.some((indicator) => indicator.id === id)) {
              throw new Error(`Missing required indicator: ${id}`);
            }
            for (const method of ["equal", "market"]) {
              if (!manifest.indexes.some((index) => index.id === `${id}-${method}`)) {
                throw new Error(`Missing required index: ${id}-${method}`);
              }
            }
          }

          function publicPathToFile(publicPath) {
            if (!publicPath.startsWith("/data/pokemon/")) {
              throw new Error(`Unexpected public data path: ${publicPath}`);
            }
            return path.join("public", publicPath.slice(1));
          }

          const singlesMetrics = ["avg1", "avg7", "avg30", "avg", "low", "trend"];
          const sealedMetrics = ["avg", "low", "trend"];
          const windowIndicatorMetrics = ["advanceDecline", "percentAbove30d", "heat", "dispersion"];
          const trendIndicatorMetrics = ["advanceDeclineTrend", "percentAboveTrend", "trendHeat", "floorStrength", "spread", "trendDispersion"];

          function sameMetrics(actual, expected) {
            return JSON.stringify(actual) === JSON.stringify(expected);
          }

          function assertMetrics(file, expected) {
            const data = readJson(file);
            if (!sameMetrics(data.metrics, expected)) {
              throw new Error(`${file} has unexpected metrics`);
            }
          }

          for (const universe of manifest.universes) {
            if (!String(universe.universeFile ?? "").startsWith("/data/pokemon/universes/")) {
              throw new Error(`manifest universe has unexpected universeFile: ${universe.universeFile}`);
            }
            if (/nintendo/i.test(`${universe.id} ${universe.name}`)) {
              throw new Error(`Unverified promo universe was published: ${universe.id}`);
            }
            const file = publicPathToFile(universe.universeFile);
            const expected = universe.id.startsWith("global-booster-") ? sealedMetrics : singlesMetrics;
            assertMetrics(file, expected);
          }

          for (const index of manifest.indexes) {
            if (!String(index.file ?? "").startsWith("/data/pokemon/indexes/")) {
              throw new Error(`manifest index has unexpected file: ${index.file}`);
            }
            const file = publicPathToFile(index.file);
            const expected = index.id.startsWith("global-booster-") ? sealedMetrics : singlesMetrics;
            assertMetrics(file, expected);
          }

          for (const indicator of manifest.indicators) {
            if (!String(indicator.file ?? "").startsWith("/data/pokemon/indicators/")) {
              throw new Error(`manifest indicator has unexpected file: ${indicator.file}`);
            }
            const file = publicPathToFile(indicator.file);
            const expected = indicator.id.startsWith("global-booster-") ? trendIndicatorMetrics : [...windowIndicatorMetrics, ...trendIndicatorMetrics];
            assertMetrics(file, expected);
          }

          for (const name of fs.readdirSync(indexDir)) {
            if (name.endsWith("-universe.json") || name === "set-singles-universes-manifest.json") {
              throw new Error(`Universe file must not remain in indexes folder: ${name}`);
            }
            if (name.endsWith(".json")) readJson(path.join(indexDir, name));
          }
          for (const name of fs.readdirSync(indicatorDir)) {
            if (name.endsWith(".json")) readJson(path.join(indicatorDir, name));
          }
          for (const name of fs.readdirSync(universeDir)) {
            if (name.endsWith(".json")) readJson(path.join(universeDir, name));
          }
          NODE

      - name: Commit generated data
        id: commit
        if: steps.update-needed.outputs.needed == 'true' && steps.price-guide.outputs.fresh == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f public/data .index-state/state.json
          if [ -d audit ]; then
            git add -f audit
          fi
          if git diff --cached --quiet; then
            echo "No generated data changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "UPD: TCG index data."
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
